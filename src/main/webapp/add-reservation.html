<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Reservation | Ocean Resort</title>

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="add-reservation.css">
</head>
<body>

    <div class="container">

        <!-- ========== SIDEBAR ========== -->
        <aside class="sidebar">
            <h2 class="logo">Ocean Resort</h2>

            <ul class="menu">
                <li onclick="navigate('dashboard')">
                    <span class="material-symbols-outlined menu-icon">dashboard</span>
                    <span>Dashboard</span>
                </li>

                <li class="active">
                    <span class="material-symbols-outlined menu-icon">event_note</span>
                    <span>Add Reservation</span>
                </li>

                <li onclick="navigate('rooms')">
                    <span class="material-symbols-outlined menu-icon">hotel</span>
                    <span>Room Details</span>
                </li>

                <li onclick="navigate('guests')">
                    <span class="material-symbols-outlined menu-icon">group</span>
                    <span>Guest Details</span>
                </li>

                <li onclick="navigate('help')">
                    <span class="material-symbols-outlined menu-icon">help</span>
                    <span>Help</span>
                </li>

                <li class="logout" onclick="logout()">
                    <span class="material-symbols-outlined menu-icon">logout</span>
                    <span>Log Out</span>
                </li>
            </ul>
        </aside>

        <!-- ========== CONTENT ========== -->
        <main class="content">

            <div class="reservation-wrapper">

                <div class="reservation-card">
                    <h1>Add New Reservation</h1>
                    <p class="subtitle">Enter guest and room details</p>

                    <form id="reservationForm">

                        <!-- ===== Guest Information ===== -->
                        <h3>Guest Information</h3>

                        <div class="form-grid">

                            <div class="input-group">
                                <label>Guest ID</label>
                                <input type="text" id="guestId" readonly>
                            </div>

                            <div class="input-group">
                                <label>Guest Name</label>
                                <input type="text" id="guestName" placeholder="Enter guest name" required>
                            </div>

                            <div class="input-group">
                                <label>Phone Number</label>
                                <input type="text" id="phone" placeholder="07XXXXXXXX" required>
                            </div>

                            <div class="input-group">
                                <label>Email Address</label>
                                <input type="email" id="email" placeholder="guest@email.com">
                            </div>

                            <div class="input-group">
                                <label>National ID Number</label>
                                <input type="text" id="nic" placeholder="NIC Number" required>
                            </div>

                            <div class="input-group full">
                                <label>Address</label>
                                <textarea id="address" placeholder="Enter address"></textarea>
                            </div>

                        </div>

                        <!-- ===== Reservation Details ===== -->
                        <h3>Reservation Details</h3>

                        <div class="form-grid">

                            <div class="input-group">
                                <label>Room Type</label>
                                <select id="roomType" required>
                                    <option value="">Select Room Type</option>
                                    <option>Single</option>
                                    <option>Double</option>
                                    <option>Suite</option>
                                    <option>Deluxe</option>
                                </select>
                            </div>

                            <div class="input-group">
                                <label>Number of Guests</label>
                                <input type="number" id="guestCount" min="1" required>
                            </div>

                            <div class="input-group">
                                <label>Check-in Date & Time</label>
                                <input type="datetime-local" id="checkIn" required>
                            </div>

                            <div class="input-group">
                                <label>Check-out Date & Time</label>
                                <input type="datetime-local" id="checkOut" required>
                            </div>

                        </div>

                        <!-- ===== Special Note ===== -->
                        <h3>Special Note</h3>

                        <div class="form-grid">
                            <div class="input-group full">
                                <label>Additional Requests / Notes</label>
                                <textarea id="specialNote"
                                    placeholder="Late check-in, food preference, extra bed, etc."></textarea>
                            </div>
                        </div>

                        <!-- ===== Buttons ===== -->
                        <div class="button-group">
                            <button type="submit" class="save-btn">
                                <span class="material-symbols-outlined">save</span>
                                Save Reservation
                            </button>

                            <button type="reset" class="clear-btn">
                                <span class="material-symbols-outlined">refresh</span>
                                Clear
                            </button>
                        </div>

                    </form>
                </div>

            </div>

        </main>

    </div>

    <script src="add-reservation.js"></script>
    <script src="dashboard.js"></script>

</body>
</html>
