<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Guest | Ocean Resort</title>

    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="edit-guest.css">
</head>
<body>

    <div class="container">

        <!-- ============ SIDEBAR ============ -->
        <aside class="sidebar">
            <h2>Ocean Resort</h2>
            <ul>
                <li onclick="navigate('dashboard')">
                    <span class="material-symbols-outlined">dashboard</span>
                    Dashboard
                </li>

                <li onclick="navigate('reservations')">
                    <span class="material-symbols-outlined">event</span>
                    Reservations
                </li>

                <li onclick="navigate('rooms')">
                    <span class="material-symbols-outlined">hotel</span>
                    Rooms
                </li>

                <li class="active">
                    <span class="material-symbols-outlined">groups</span>
                    Guests
                </li>

                <li onclick="navigate('help')">
                    <span class="material-symbols-outlined">help</span>
                    Help
                </li>

                <li onclick="logout()">
                    <span class="material-symbols-outlined">logout</span>
                    Exit
                </li>
            </ul>
        </aside>

        <!-- ============ CONTENT ============ -->
        <main class="content">

            <div class="form-card">
                <h1>Edit Guest Details</h1>
                <p class="subtitle">Update guest information</p>

                <form id="editGuestForm">

                    <div class="form-grid">

                        <div class="input-group">
                            <label>Guest ID</label>
                            <input type="text" id="guestId" readonly>
                        </div>

                        <div class="input-group">
                            <label>Guest Name</label>
                            <input type="text" id="guestName" required>
                        </div>

                        <div class="input-group">
                            <label>Phone Number</label>
                            <input type="text" id="phone" required>
                        </div>

                        <div class="input-group">
                            <label>Email</label>
                            <input type="email" id="email">
                        </div>

                        <div class="input-group">
                            <label>National ID (NIC)</label>
                            <input type="text" id="nic" required>
                        </div>

                        <div class="input-group full">
                            <label>Address</label>
                            <textarea id="address" rows="3"></textarea>
                        </div>

                    </div>

                    <div class="button-group">
                        <button type="submit" class="save-btn">
                            <span class="material-symbols-outlined">save</span>
                            Update Guest
                        </button>

                        <button type="button" class="cancel-btn" onclick="navigate('guests')">
                            <span class="material-symbols-outlined">close</span>
                            Cancel
                        </button>
                    </div>

                </form>
            </div>

        </main>

    </div>

    <script src="edit-guest.js"></script>
</body>
</html>
