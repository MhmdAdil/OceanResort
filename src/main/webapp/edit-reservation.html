<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Reservation</title>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="edit-reservation.css">
</head>

<body>

<div class="reservation-wrapper">
    <div class="reservation-card">

        <h1>Edit Reservation</h1>
        <p class="subtitle">Update reservation details</p>

        <form id="reservationForm">

            <h3>Guest Information</h3>

            <div class="form-grid">

                <div class="input-group">
                    <label>Reservation ID</label>
                    <select id="reservationId"></select>
                </div>

                <div class="input-group">
                    <label> Name</label>
                    <input type="text" id="guestName" required>
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="text" id="phone" required>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email">
                </div>

                <div class="input-group">
                    <label>NIC</label>
                    <input type="text" id="nic" required>
                </div>

                <div class="input-group full">
                    <label>Address</label>
                    <textarea id="address"></textarea>
                </div>

            </div>

            <h3>Reservation Details</h3>

            <div class="form-grid">

                <div class="input-group">
                    <label>Room Type</label>
                    <select id="roomType" required>
                        <option value="">Select Room Type</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>No of Guests</label>
                    <input type="number" id="guestCount">
                </div>

                <div class="input-group">
                    <label>Check-in</label>
                    <input type="datetime-local" id="checkIn">
                </div>

                <div class="input-group">
                    <label>Check-out</label>
                    <input type="datetime-local" id="checkOut">
                </div>

            </div>

            <h3>Special Note</h3>

            <div class="input-group full">
                <textarea id="note"></textarea>
            </div>

            <div class="button-group">

                <button type="submit" class="save-btn">
                    <span class="material-symbols-outlined">save</span>
                    Update Reservation
                </button>

                <button type="reset" class="clear-btn">
                    <span class="material-symbols-outlined">refresh</span>
                    Clear
                </button>

            </div>

        </form>

    </div>
</div>

<script src="edit-reservation.js"></script>

</body>
</html>
