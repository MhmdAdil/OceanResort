<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Room | Ocean Resort</title>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

    <link rel="stylesheet" href="add-room.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="container">

    <!-- Side Menu -->
    <div class="sidebar">
        <h1 class="logo">Ocean Resort</h1>

        <ul class="menu">
            <li onclick="navigate('home')">
                <span class="material-symbols-outlined menu-icon">dashboard</span>
                <span>Home</span>
            </li>
            <li onclick="navigate('register')">
                <span class="material-symbols-outlined menu-icon">group</span>
                <span>Register a Staff</span>
            </li>

            <li onclick="navigate('rooms')">
                <span class="material-symbols-outlined menu-icon">hotel</span>
                <span>Room Details</span>
            </li>

            <li onclick="navigate('help')">
                <span class="material-symbols-outlined menu-icon">help</span>
                <span>Help</span>
            </li>

            <li class="logout" onclick="logout()">
                <span class="material-symbols-outlined menu-icon">logout</span>
                <span>Log Out</span>
            </li>
        </ul>
    </div>

    <main class="content">

        <div class="page-header">
            <h1>Add New Room</h1>
            <p>Enter room information</p>
        </div>

        <div class="form-card">

            <form id="addRoomForm">

                <div class="form-grid">

                    <div class="input-group">
                        <label>Room ID</label>
                        <input type="text" id="roomId" readonly>
                    </div>

                    <div class="input-group">
                        <label>Room Type</label>
                        <select id="roomType" required>
                            <option value="">Select Room Type</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Capacity</label>
                        <input type="number" id="capacity" min="1" required>
                    </div>

                    <div class="input-group">
                        <label>Price per Night (LKR)</label>
                        <input type="number" id="price" min="0" required>
                    </div>

                    <div class="input-group">
                        <label>Status</label>
                        <select id="status" required>
                            <option>Available</option>
                            <option>Occupied</option>
                            <option>Maintenance</option>
                        </select>
                    </div>

                    <div class="input-group full">
                        <label>Description</label>
                        <textarea id="description" placeholder="Optional room description"></textarea>
                    </div>

                </div>

                <div class="button-group">
                    <button type="submit" class="save-btn">
                        <span class="material-symbols-outlined">save</span>
                        Save Room
                    </button>

                    <button type="reset" class="clear-btn">
                        <span class="material-symbols-outlined">refresh</span>
                        Clear
                    </button>
                </div>

            </form>
        </div>
    </main>
</div>

<script src="add-room.js"></script>
<script src="navigation.js"></script>
</body>
</html>
